name: toyoko_inn_monitor
description: "東橫 INN 飯店房價監控器 — Flutter 全平台版本"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP
  dio: ^5.8.0+1

  # Charts
  fl_chart: ^0.69.2

  # Windows: system tray & window management
  tray_manager: ^0.2.3
  window_manager: ^0.4.3

  # Notifications (cross-platform + desktop)
  flutter_local_notifications: ^18.0.0
  local_notifier: ^0.1.3

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.0

  # Settings persistence
  shared_preferences: ^2.3.5

  # Navigation
  go_router: ^14.8.1

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  package_info_plus: ^8.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  generate: true
