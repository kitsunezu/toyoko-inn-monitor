name: Release Windows Packages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate l10n & build_runner
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc `
            /DAppVersion="${{ steps.version.outputs.VERSION }}" `
            installer\installer.iss

      - name: Build portable package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $releaseDir = "build\windows\x64\runner\Release"
          $portableRoot = "dist\portable\ToyokoInnMonitor-$version"
          New-Item -ItemType Directory -Force -Path $portableRoot | Out-Null
          Copy-Item -Path "$releaseDir\*" -Destination $portableRoot -Recurse -Force
          Compress-Archive `
            -Path $portableRoot `
            -DestinationPath "dist\ToyokoInnMonitor-$version-portable.zip" `
            -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Toyoko Inn Monitor ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/ToyokoInnMonitor-${{ steps.version.outputs.VERSION }}-setup.exe
            dist/ToyokoInnMonitor-${{ steps.version.outputs.VERSION }}-portable.zip
